<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة المذيع - جاوب مع راشد</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f1f5f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            padding: 20px;
        }
        .waiting {
            color: #475569; font-size: 1.2rem;
        }
        .host-card {
            background: var(--card);
            border: 2px solid var(--accent);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to   { opacity: 1; transform: scale(1); }
        }
        .cat-badge {
            background: var(--accent);
            display: inline-block;
            padding: 5px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            margin-bottom: 12px;
        }
        .val-badge {
            background: #334155;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            color: #93c5fd;
        }
        .question-text {
            font-size: 1.5rem;
            line-height: 1.7;
            margin-bottom: 30px;
            color: #cbd5e1;
        }
        .answer-box {
            background: rgba(34, 197, 94, 0.12);
            border: 2px solid #22c55e;
            border-radius: 12px;
            padding: 18px 24px;
        }
        .answer-label { font-size: 0.85rem; color: #6ee7b7; margin-bottom: 6px; }
        .answer-text  { font-size: 2rem; font-weight: bold; color: #4ade80; }
        .header {
            position: fixed; top: 0; left: 0; right: 0;
            background: #1e293b;
            padding: 10px 20px;
            border-bottom: 1px solid #334155;
            font-size: 0.9rem;
            color: #64748b;
            display: flex; justify-content: space-between; align-items: center;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; margin-left: 6px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    </style>
</head>
<body>
    <div class="header">
        <span>🎙️ شاشة المذيع</span>
        <span><span class="dot"></span> متصل</span>
    </div>

    <div class="waiting" id="waiting">⏳ في انتظار فتح سؤال...</div>

    <div class="host-card" id="host-card">
        <div class="cat-badge" id="h-cat"></div>
        <div class="val-badge" id="h-val"></div>
        <div class="question-text" id="h-question"></div>
        <div class="answer-box">
            <div class="answer-label">الإجابة الصحيحة</div>
            <div class="answer-text" id="h-answer"></div>
        </div>
    </div>

    <script>
        function checkStorage() {
            const data = localStorage.getItem('rashid_current_q');
            if (!data) return;
            try {
                const q = JSON.parse(data);
                document.getElementById('waiting').style.display = 'none';
                document.getElementById('host-card').style.display = 'block';
                document.getElementById('h-cat').innerText = q.cat;
                document.getElementById('h-val').innerText = q.val + ' نقطة';
                document.getElementById('h-question').innerText = q.question;
                document.getElementById('h-answer').innerText = q.answer;
            } catch(e) {}
        }

        // يتحقق كل 300ms من وجود سؤال جديد
        setInterval(checkStorage, 300);
        checkStorage();

        // يستمع لأي تغيير في localStorage
        window.addEventListener('storage', checkStorage);
    </script>
</body>
</html>
